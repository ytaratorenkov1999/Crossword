<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Crossword</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ГЛАВНАЯ СТРАНИЦА -->
  <div id="main-screen" class="screen active">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span>Кроссворды</span>
        </div>

      </div>
    </header>
    <main class="cards-grid" id="cards-container"></main>
  </div>

  <!-- ЭКРАН КРОССВОРДА -->
  <div id="game-screen" class="screen">
    <div class="game-header" id="game-header">
      <button class="game-back-btn" id="back-to-main" title="Назад к выбору">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 4L6 9L11 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Назад</span>
      </button>
      <div class="game-title" id="game-title">Кроссворд #1</div>
    </div>

    <div class="crossword-wrapper" id="crossword-wrapper">
      <div class="crossword-grid" id="crossword-grid"></div>
    </div>

    <div class="game-right">
      <div class="clue-panel" id="clue-panel">
        <button class="clue-arrow" id="clue-arrow-left">‹</button>
        <div class="clue-text" id="clue-text"></div>
        <button class="clue-arrow" id="clue-arrow-right">›</button>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

<!-- МОДАЛЬНОЕ ОКНО -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-clue" id="modal-clue"></div>
      <button class="modal-ok" id="modal-ok">Понятно</button>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО ПОБЕДЫ -->
  <div class="modal-overlay" id="win-modal-overlay">
    <div class="modal-box win-modal-box">
      <div class="win-emoji">🎉</div>
      <div class="win-title">Поздравляем!</div>
      <div class="win-subtitle" id="win-subtitle">Кроссворд решён!</div>
      <div class="win-modal-btns">
        <button class="modal-cancel win-btn-restart" id="win-restart">Начать заново</button>
        <button class="modal-ok win-btn-choose" id="win-choose">Выбрать другой</button>
      </div>
    </div>
  </div>

  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

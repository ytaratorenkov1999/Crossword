<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Кроссворды</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ГЛАВНАЯ СТРАНИЦА -->
  <div id="main-screen" class="screen active">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span>Кроссворды</span>
        </div>
        <button class="close-btn" id="close-main" title="Закрыть">✕</button>
      </div>
    </header>
    <main class="cards-grid" id="cards-container"></main>
  </div>

  <!-- ЭКРАН КРОССВОРДА -->
  <div id="game-screen" class="screen">
    <div class="game-header" id="game-header">
      <div class="game-title" id="game-title">Кроссворд #1</div>
      <button class="game-exit-btn" id="back-to-main" title="Выйти к выбору кроссворда">✕</button>
    </div>

    <div class="crossword-wrapper" id="crossword-wrapper">
      <div class="crossword-grid" id="crossword-grid"></div>
    </div>

    <div class="game-right">
      <div class="clue-panel" id="clue-panel">
        <button class="clue-arrow" id="clue-arrow-left">‹</button>
        <div class="clue-text" id="clue-text"></div>
        <button class="clue-arrow" id="clue-arrow-right">›</button>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО ВЫХОДА (главный экран) -->
  <div class="modal-overlay" id="exit-modal-overlay">
    <div class="modal-box">
      <div class="modal-clue" id="exit-modal-text">Вы хотите покинуть игру?</div>
      <div class="exit-modal-btns">
        <button class="modal-cancel" id="exit-modal-no">Нет</button>
        <button class="modal-ok" id="exit-modal-yes">Да</button>
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-clue" id="modal-clue"></div>
      <button class="modal-ok" id="modal-ok">Понятно</button>
    </div>
  </div>

  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
